services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order_service
    ports:
      - "50051:50051"
    environment:
      - DB_USERNAME=user
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=mydb
      - DB_URL=postgres://user:password@postgres:5432/mydb?sslmode=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - order_network
    stop_grace_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: order_postgres
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - order_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: order_redis
    ports:
      - "6379:6379"
    networks:
      - order_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
    name: order_postgres_data

networks:
  order_network:
    driver: bridge